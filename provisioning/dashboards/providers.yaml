apiVersion: 1

providers:
  - name: briangann-datatable-panel
    # <int> Org id. Default to 1
    orgId: 1
    # <string> name of the dashboard folder.
    folder: briangann-datatable-panel
    # <string> folder UID. will be automatically generated if not specified
    folderUid: ""
    # <string> provider type. Default to 'file'
    type: file
    # <bool> disable dashboard deletion
    disableDeletion: false
    # <int> how often Grafana will scan for changed dashboards
    updateIntervalSeconds: 10
    # <bool> allow updating provisioned dashboards from the UI
    allowUiUpdates: true
    options:
      # <string, required> path to dashboard files on disk. Required when using the 'file' type
      path: /etc/grafana/provisioning/dashboards/dashboards
      # <bool> use folder names from filesystem to create folders in Grafana
      foldersFromFilesStructure: false

  - name: dt-service-health
    orgId: 1
    folder: "01 - Service Health"
    folderUid: dt-ex-01
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/examples/01 - Service Health
      foldersFromFilesStructure: false

  - name: dt-server-metrics
    orgId: 1
    folder: "02 - Server Metrics"
    folderUid: dt-ex-02
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/examples/02 - Server Metrics
      foldersFromFilesStructure: false

  - name: dt-space-launches
    orgId: 1
    folder: "03 - Space Launches"
    folderUid: dt-ex-03
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/examples/03 - Space Launches
      foldersFromFilesStructure: false

  - name: dt-logs
    orgId: 1
    folder: "04 - Logs"
    folderUid: dt-ex-04
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/examples/04 - Logs
      foldersFromFilesStructure: false

  - name: dt-network-topology
    orgId: 1
    folder: "05 - Network Topology"
    folderUid: dt-ex-05
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/examples/05 - Network Topology
      foldersFromFilesStructure: false

  - name: dt-rack-inventory
    orgId: 1
    folder: "06 - Rack Inventory"
    folderUid: dt-ex-06
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/examples/06 - Rack Inventory
      foldersFromFilesStructure: false
