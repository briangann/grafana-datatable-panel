name: Coverage Report

on:
  pull_request:

# Cancel superseded PR runs when new commits land.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  coverage:
    name: Jest Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run tests with coverage (PR)
        run: pnpm exec jest --ci --coverage --coverageReporters=json-summary --coverageReporters=json --maxWorkers=4

      - name: Save PR coverage
        run: |
          mkdir -p /tmp/pr-coverage
          cp coverage/coverage-summary.json /tmp/pr-coverage/coverage-summary.json

      - name: Checkout base branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          clean: false

      - name: Install dependencies (base)
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run tests with coverage (base)
        run: pnpm exec jest --ci --coverage --coverageReporters=json-summary --coverageReporters=json --maxWorkers=4

      - name: Save base coverage
        run: |
          mkdir -p /tmp/base-coverage
          cp coverage/coverage-summary.json /tmp/base-coverage/coverage-summary.json

      - name: Restore PR coverage
        run: |
          cp /tmp/pr-coverage/coverage-summary.json coverage/coverage-summary.json

      - name: Coverage report
        uses: davelosert/vitest-coverage-report-action@2500dafcee7dd64f85ab689c0b83798a8359770e # v2.9.3
        with:
          json-summary-compare-path: /tmp/base-coverage/coverage-summary.json
          file-coverage-mode: all
