name: Coverage Report

on:
  pull_request:

# Cancel superseded PR runs when new commits land.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  coverage:
    name: Jest Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run tests with coverage (PR)
        run: pnpm exec jest --ci --coverage --coverageReporters=json-summary --coverageReporters=json --maxWorkers=4

      - name: Save PR coverage
        run: |
          mkdir -p /tmp/pr-coverage
          cp coverage/coverage-summary.json /tmp/pr-coverage/coverage-summary.json

      - name: Checkout base branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          clean: false

      - name: Install dependencies (base)
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run tests with coverage (base)
        run: pnpm exec jest --ci --coverage --coverageReporters=json-summary --coverageReporters=json --maxWorkers=4

      - name: Save base coverage
        run: |
          mkdir -p /tmp/base-coverage
          cp coverage/coverage-summary.json /tmp/base-coverage/coverage-summary.json

      - name: Restore PR coverage
        run: |
          cp /tmp/pr-coverage/coverage-summary.json coverage/coverage-summary.json

      - name: Coverage report
        uses: davelosert/vitest-coverage-report-action@02f3c2e641286b7fa308cd3e430783103ce6103b  # v2.12.0
        with:
          json-summary-compare-path: /tmp/base-coverage/coverage-summary.json
          file-coverage-mode: all
