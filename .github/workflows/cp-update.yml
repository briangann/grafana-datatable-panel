name: Create Plugin Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *' # run once a month on the 1st day

# To use the default github token with the following elevated permissions make sure to check:
# **Allow GitHub Actions to create and approve pull requests** in https://github.com/ORG_NAME/REPO_NAME/settings/actions.
# Alternatively create a fine-grained personal access token for your repository with
# `contents: read and write` and `pull requests: read and write` and pass it to the action.

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # The action authenticates via the GH_PAT_TOKEN passed below; the
    # default GITHUB_TOKEN is not used, so no workflow-granted scopes
    # are needed. The elevated permissions referenced in the comment
    # above only apply if you switch `token` back to secrets.GITHUB_TOKEN.
    permissions: {}
    steps:
      - uses: grafana/plugin-actions/create-plugin-update@244c3bc9c6eb94bc1dd6458ade2462499bbf0f5b # create-plugin-update/v2.0.1
        with:
          # Fine-grained personal access token saved in repo secrets as `GH_PAT_TOKEN`.
          # See https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens
          token: ${{ secrets.GH_PAT_TOKEN }}
